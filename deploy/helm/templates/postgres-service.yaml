{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "flashcards.fullname" . }}-postgres
  labels:
    {{- include "flashcards.labels" . | nindent 4 }}
spec:
  # Headless service: DNS resolves directly to the pod IP.
  # Required by StatefulSets so each pod gets a stable DNS name.
  clusterIP: None
  selector:
    {{- include "flashcards.postgresSelectorLabels" . | nindent 4 }}
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
      protocol: TCP
{{- end }}
