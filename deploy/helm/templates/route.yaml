apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ include "flashcards.fullname" . }}
  labels:
    {{- include "flashcards.labels" . | nindent 4 }}
  annotations:
    # Tell the APPUiO / OpenShift cert-manager integration to issue a
    # Let's Encrypt certificate for the custom domain automatically.
    kubernetes.io/tls-acme: "true"
spec:
  host: {{ .Values.route.host | quote }}
  to:
    kind: Service
    name: {{ include "flashcards.fullname" . }}
    weight: 100
  port:
    targetPort: http
  tls:
    termination: {{ .Values.route.tls.termination }}
    insecureEdgeTerminationPolicy: {{ .Values.route.tls.insecureEdgeTerminationPolicy }}
