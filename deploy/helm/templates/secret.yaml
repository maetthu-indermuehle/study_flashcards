apiVersion: v1
kind: Secret
metadata:
  name: {{ include "flashcards.fullname" . }}-secret
  labels:
    {{- include "flashcards.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Prisma connection string, constructed from postgres.* values.
  DATABASE_URL: {{ include "flashcards.databaseUrl" . | quote }}
  # At least 32 characters. Generate: openssl rand -base64 32
  SESSION_SECRET: {{ required "secrets.sessionSecret is required — pass via --set secrets.sessionSecret=<value>" .Values.secrets.sessionSecret | quote }}
  # Initial admin credentials used by the post-install seed Job.
  SEED_USER_EMAIL: {{ required "secrets.seedAdminEmail is required — pass via --set secrets.seedAdminEmail=<value>" .Values.secrets.seedAdminEmail | quote }}
  SEED_USER_PASSWORD: {{ required "secrets.seedAdminPassword is required — pass via --set secrets.seedAdminPassword=<value>" .Values.secrets.seedAdminPassword | quote }}
