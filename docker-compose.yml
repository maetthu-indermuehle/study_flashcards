services:
  app:
    build:
      context: ./app
      target: development
    # npm install runs on every startup to keep the node_modules volume in sync
    # with package.json after dependency changes (adding/removing packages).
    # prisma migrate deploy is non-interactive and safe for container startup.
    # The seed script is idempotent, so re-running on restart is harmless.
    command: >
      sh -c "npm install &&
             npx prisma migrate deploy &&
             npx prisma db seed &&
             npm run dev -- --hostname 0.0.0.0 --webpack"
    environment:
      DATABASE_URL: postgresql://flashcards:flashcards@db:5432/flashcards?schema=public
      PORT: 3000
      SEED_USER_EMAIL: admin@local.dev
      SEED_USER_PASSWORD: localdev
      # Local dev only — not a secret. Generate a production value with: openssl rand -base64 32
      SESSION_SECRET: local-dev-session-secret-not-for-production-use
    ports:
      - "3000:3000"
    volumes:
      - ./app:/app
      - app_node_modules:/app/node_modules
      - ./data:/data
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: flashcards
      POSTGRES_USER: flashcards
      POSTGRES_PASSWORD: flashcards
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flashcards -d flashcards"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  app_node_modules:
  postgres_data:
